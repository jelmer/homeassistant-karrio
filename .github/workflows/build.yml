name: Build

on:
  push:
    branches: [main, master]
    paths:
      - "karrio/**"
      - ".github/workflows/build.yml"
  pull_request:
    paths:
      - "karrio/**"
      - ".github/workflows/build.yml"
  release:
    types: [published]
  workflow_dispatch:

env:
  ARCHITECTURES: '["amd64", "aarch64"]'
  IMAGE_NAME: homeassistant-karrio

permissions:
  contents: read

jobs:
  init:
    name: Initialize build
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.matrix.outputs.matrix }}
    steps:
      - uses: actions/checkout@v6

      - name: Get build matrix
        id: matrix
        uses: home-assistant/builder/actions/prepare-multi-arch-matrix@2026.06.0
        with:
          architectures: ${{ env.ARCHITECTURES }}
          image-name: ${{ env.IMAGE_NAME }}

  build:
    name: Build ${{ matrix.arch }} image
    needs: init
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
      id-token: write
      packages: write
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.init.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v6

      - name: Build image
        uses: home-assistant/builder/actions/build-image@2026.06.0
        with:
          arch: ${{ matrix.arch }}
          build-path: karrio
          container-registry-password: ${{ secrets.GITHUB_TOKEN }}
          image: ${{ matrix.image }}
          # Only push on release or pushes to the default branch; PRs build
          # but don't publish.
          image-tags: |
            ${{ github.event_name == 'release' && github.event.release.tag_name || '' }}
            ${{ github.event_name != 'pull_request' && 'latest' || '' }}
          push: ${{ github.event_name != 'pull_request' }}
          version: ${{ github.event_name == 'release' && github.event.release.tag_name || github.sha }}

  manifest:
    name: Publish multi-arch manifest
    needs: [init, build]
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      packages: write
    steps:
      - name: Publish multi-arch manifest
        uses: home-assistant/builder/actions/publish-multi-arch-manifest@2026.06.0
        with:
          architectures: ${{ env.ARCHITECTURES }}
          container-registry-password: ${{ secrets.GITHUB_TOKEN }}
          image-name: ${{ env.IMAGE_NAME }}
          image-tags: |
            ${{ github.event_name == 'release' && github.event.release.tag_name || '' }}
            latest
