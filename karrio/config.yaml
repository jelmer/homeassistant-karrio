---
name: Karrio
version: "2026.1.32-7"
slug: karrio
description: Open-source shipping API platform (single-process, SQLite-backed)
url: https://github.com/jelmer/homeassistant-karrio/tree/main/karrio
# Prebuilt multi-arch image; the version above is used as the tag.
image: ghcr.io/jelmer/homeassistant-karrio
arch:
  - aarch64
  - amd64
init: false
startup: application
boot: auto
ports:
  "5002/tcp": 5002
ports_description:
  "5002/tcp": Karrio API and admin UI (direct, no HA auth)
ingress: true
ingress_port: 5002
panel_icon: mdi:truck-delivery
panel_title: Karrio
options:
  secret_key: ""
  admin_email: "admin@example.com"
  admin_password: "demo"
  allow_signup: false
  enable_all_plugins: true
  workers: 2
  background_workers: 2
schema:
  secret_key: password?
  admin_email: email
  admin_password: password
  allow_signup: bool
  enable_all_plugins: bool
  workers: int(1,16)
  background_workers: int(1,16)
watchdog: "tcp://[HOST]:[PORT:5002]"
